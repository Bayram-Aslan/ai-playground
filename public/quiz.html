<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>QUIZ ARENA // MISSION</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body class="game-body">
    <div id="init-screen" class="central-box">
        <h2>OPERASYON BÖLGESİ</h2>
        <input type="text" id="room-input" placeholder="ODA KODU (ÖR: AKU101)">
        <button class="ready-btn" onclick="joinMultiplayer()">ÇOKLU OYUNCUYA BAĞLAN</button>
    </div>

    <div id="lobby" class="central-box" style="display:none;">
        <h2 id="lobby-title">BAĞLANTI BEKLENİYOR...</h2>
        <button id="start-trigger" class="ready-btn" onclick="triggerAction()">HAZIR OL</button>
    </div>

    <div id="arena" class="game-container" style="display:none;">
        <div class="stats-bar">
            <div id="q-number">MISSION: 1/10</div>
            <div id="timer-bar-container"><div id="timer-bar"></div></div>
        </div>
        <div id="q-text" class="question-box">VERİ ALINIYOR...</div>
        <div id="feedback-box" style="height:30px; text-align:center; margin-bottom:10px;"></div>
        <div id="options" class="options-grid"></div>
        <div id="leaderboard" class="side-panel">
            <h3>LİDERLİK TABLOSU</h3>
            <div id="lb-list"></div>
        </div>
    </div>

    <div id="end-screen" class="central-box" style="display:none;">
        <h2>OPERASYON TAMAMLANDI</h2>
        <div class="final-stat">PUAN: <span id="final-score">0</span></div>
        <div class="final-stat">DOĞRU: <span id="final-correct">0</span></div>
        <button class="ready-btn" onclick="location.reload()">YENİDEN BAŞLAT</button>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
