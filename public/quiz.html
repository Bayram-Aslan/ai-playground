<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELECTRO-BATTLE | ARENA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --panel: rgba(15,15,15,0.98); --danger: #ff1e1e; }
        
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow-x: hidden; }
        
        /* ÜST NAVİGASYON */
        .top-nav {
            width: 100%; height: 60px; background: rgba(0,0,0,0.9); border-bottom: 1px solid #222;
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            box-sizing: border-box; z-index: 100;
        }
        .nav-logo { font-family: 'Orbitron'; font-weight: 900; color: var(--neon); letter-spacing: 2px; font-size: 1rem; }
        .exit-btn {
            background: rgba(255, 30, 30, 0.1); border: 1px solid var(--danger); color: var(--danger);
            padding: 8px 15px; border-radius: 5px; font-family: 'Orbitron'; font-size: 0.7rem;
            text-decoration: none; transition: 0.3s;
        }
        .exit-btn:hover { background: var(--danger); color: white; }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; padding: 15px; box-sizing: border-box; }
        .grid-bg { position: fixed; inset: 0; background-image: radial-gradient(circle at center, #111 0%, #000 100%); z-index: -1; }

        /* LOBİ */
        #lobby { text-align: center; background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid #333; width: 100%; max-width: 450px; }
        .user-count { font-family: 'Orbitron'; color: var(--neon); font-size: 0.9rem; margin-bottom: 20px; }
        .ready-btn { background: var(--neon); color: black; border: none; padding: 20px 0; width: 100%; font-size: 1.8rem; font-family: 'Orbitron'; font-weight: 900; border-radius: 12px; cursor: pointer; }
        .ready-btn.waiting { background: #333; color: #777; cursor: not-allowed; }

        /* ARENA */
        #arena { width: 100%; max-width: 1100px; display: none; grid-template-columns: 1fr 320px; gap: 20px; }
        .question-zone { background: var(--panel); padding: 30px; border-radius: 15px; border: 1px solid #222; text-align: center; position: relative; }
        #timer-bar { position: absolute; top: 0; left: 0; height: 6px; background: var(--neon); width: 100%; transition: linear 0.1s; }
        #q-text { font-size: 1.8rem; margin: 30px 0; min-height: 80px; line-height: 1.2; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt { background: #0a0a0a; border: 2px solid #222; color: white; padding: 20px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; transition: 0.2s; font-family: 'Rajdhani'; font-weight: 700; }
        
        /* SIRALAMA */
        .leaderboard { background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .lb-title { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon); text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .lb-item { display: flex; justify-content: space-between; padding: 10px; font-size: 0.85rem; border-bottom: 1px solid #1a1a1a; font-family: 'Orbitron'; }
        .lb-item.me { background: rgba(0,255,136,0.1); color: var(--neon); border-radius: 5px; }
        
        #feedback-box { margin-top: 20px; font-family: 'Orbitron'; font-size: 0.9rem; min-height: 50px; }

        /* MOBİL UYUM */
        @media (max-width: 768px) {
            #arena { grid-template-columns: 1fr; }
            .leaderboard { order: 2; }
            .question-zone { order: 1; padding: 20px; }
            #q-text { font-size: 1.4rem; }
            .options-grid { grid-template-columns: 1fr; }
            .opt { padding: 15px; font-size: 1.1rem; }
            .top-nav { padding: 0 10px; }
            .nav-logo { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <nav class="top-nav">
        <div class="nav-logo">ELECTRO-BATTLE // ARENA</div>
        <a href="/" class="exit-btn">LOBİYE DÖN</a>
    </nav>

    <div class="main-content">
        <div id="lobby">
            <div class="user-count">AKTİF OPERATÖR: <span id="count">1</span></div>
            <h1 style="font-family: 'Orbitron'; font-size: 2rem; margin-bottom: 25px;">HAZIR MISIN?</h1>
            <button id="ready-btn" class="ready-btn" onclick="setReady()">BAŞLA</button>
            <div id="countdown" style="font-size: 1.5rem; margin-top: 20px; font-family: 'Orbitron'; color: var(--neon);"></div>
        </div>

        <div id="arena">
            <div class="question-zone">
                <div id="timer-bar"></div>
                <div id="q-number" style="color: #555; margin-bottom: 10px; font-family: 'Orbitron'; font-size: 0.7rem;">MISSION: 1 / 10</div>
                <h2 id="q-text">Veri Bekleniyor...</h2>
                <div id="options" class="options-grid"></div>
                <div id="feedback-box"></div>
            </div>

            <div class="leaderboard">
                <div class="lb-title">TOP 10 RANKING</div>
                <div id="lb-list"></div>
            </div>
        </div>
    </div>

    <script src="games/quiz.js"></script>
</body>
</html>
