<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ARENA | CHARACTER SELECTION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff88;
            --rare: #00d4ff;
            --legendary: #ff00ff;
            --bg: #050505;
        }

        body, html { margin: 0; padding: 0; background: var(--bg); font-family: 'Rajdhani', sans-serif; color: white; overflow-x: hidden; }

        .bg-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        /* Giriş Kartı */
        #login-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }

        .auth-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Avatar Grid Geliştirildi */
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 25px 0;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        /* Özel Kaydırma Çubuğu */
        .avatar-grid::-webkit-scrollbar { width: 5px; }
        .avatar-grid::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

        .avatar-item {
            font-size: 2rem;
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            display: flex; align-items: center; justify-content: center;
        }

        .avatar-item:hover { transform: scale(1.1); background: #334155; }
        .avatar-item.selected { border-color: var(--neon); background: rgba(0,255,136,0.1); box-shadow: 0 0 15px var(--neon); }

        /* Nadirlik Renkleri */
        .rare { border-bottom: 3px solid var(--rare) !important; }
        .legend { border-bottom: 3px solid var(--legendary) !important; }

        input {
            width: 100%; background: #000; border: 1px solid #444;
            padding: 15px; border-radius: 10px; color: white;
            font-family: 'Orbitron'; text-align: center; margin-bottom: 20px;
            box-sizing: border-box; font-size: 1rem;
        }

        .btn-join {
            width: 100%; background: var(--neon); color: black;
            padding: 18px; border: none; border-radius: 12px;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }

        .btn-join:hover { box-shadow: 0 0 30px var(--neon); letter-spacing: 4px; }

        #lobby { display: none; padding-top: 80px; text-align: center; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div id="login-container">
        <div class="auth-card">
            <h1 style="font-family: 'Orbitron'; margin-bottom: 5px; color: var(--neon);">ARENA ACCESS</h1>
            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 30px;">BATTLE-READY OPERATORS ONLY</p>
            
            <input type="text" id="username" placeholder="OPERATÖR TAKMA ADI" maxlength="12">

            <div class="avatar-grid">
                <div class="avatar-item selected" onclick="pick(this, '🤖')">🤖</div>
                <div class="avatar-item" onclick="pick(this, '👨‍💻')">👨‍💻</div>
                <div class="avatar-item" onclick="pick(this, '🕵️')">🕵️</div>
                <div class="avatar-item" onclick="pick(this, '👮')">👮</div>
                <div class="avatar-item" onclick="pick(this, '👷')">👷</div>
                <div class="avatar-item" onclick="pick(this, '🧑‍🔬')">🧑‍🔬</div>
                <div class="avatar-item rare" onclick="pick(this, '🐱‍💻')">🐱‍💻</div>
                <div class="avatar-item rare" onclick="pick(this, '👽')">👽</div>
                <div class="avatar-item rare" onclick="pick(this, '👻')">👻</div>
                <div class="avatar-item rare" onclick="pick(this, '🛸')">🛸</div>
                <div class="avatar-item legend" onclick="pick(this, '🐲')">🐲</div>
                <div class="avatar-item legend" onclick="pick(this, '⚡')">⚡</div>
                <div class="avatar-item legend" onclick="pick(this, '🔥')">🔥</div>
                <div class="avatar-item legend" onclick="pick(this, '👑')">👑</div>
                <div class="avatar-item legend" onclick="pick(this, '🧙‍♂️')">🧙‍♂️</div>
                <div class="avatar-item legend" onclick="pick(this, '👹')">👹</div>
            </div>

            <button class="btn-join" onclick="enter()">SİSTEME SIZ</button>
        </div>
    </div>

    <div id="lobby">
        <h2 id="welcome-msg" style="font-family: 'Orbitron';"></h2>
        <div style="margin-top: 50px;">
            <a href="/quiz.html" style="text-decoration: none; display: inline-block; background: #161b22; padding: 40px; border-radius: 20px; border: 1px solid var(--neon);">
                <i class="fas fa-play" style="font-size: 3rem; color: var(--neon);"></i>
                <h3 style="color: white;">ZAMAN TAHMİNİ'Nİ BAŞLAT</h3>
            </a>
        </div>
    </div>

    <script>
        let selected = '🤖';

        function pick(el, avatar) {
            document.querySelectorAll('.avatar-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selected = avatar;
        }

        function enter() {
            const val = document.getElementById('username').value;
            if(val.length < 2) return alert("İsimsiz kahraman olmaz!");
            
            localStorage.setItem('user', val);
            localStorage.setItem('avatar', selected);
            show(val, selected);
        }

        function show(n, a) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('lobby').style.display = 'block';
            document.getElementById('welcome-msg').innerHTML = `${a} HOŞ GELDİN, ${n.toUpperCase()}`;
        }

        window.onload = () => {
            const n = localStorage.getItem('user');
            const a = localStorage.getItem('avatar');
            if(n) show(n, a);
        }
    </script>
</body>
</html>
