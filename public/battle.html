<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POWER BATTLE | NEON ARENA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00ff88; --danger: #ff0055; --gold: #ffcf00; 
            --cyan: #00d2ff; --purple: #b026ff; --bg: #030305; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; 
            /* Mobil tarayıcı adres çubuğu sorununu çözen dVH kullanımı */
            min-height: 100vh; height: 100dvh; 
            overflow: hidden; display: flex; flex-direction: column; 
        }

        /* --- ARKA PLAN --- */
        .bg-core { position: fixed; inset: 0; z-index: -5; background: #020204; }
        .orb { position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.3; z-index: -4; animation: floatOrb 10s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 300px; height: 300px; background: var(--cyan); top: 10%; left: 10%; }
        .orb-2 { width: 250px; height: 250px; background: var(--purple); bottom: 10%; right: 10%; animation-delay: -3s; }
        .cyber-grid { 
            position: fixed; bottom: -50%; left: -50%; width: 200%; height: 150%; z-index: -3;
            background-image: linear-gradient(rgba(0, 210, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 136, 0.1) 1px, transparent 1px);
            background-size: 50px 50px; transform: perspective(600px) rotateX(75deg); animation: gridFlow 10s linear infinite;
        }
        @keyframes gridFlow { 0% { transform: perspective(600px) rotateX(75deg) translateY(0); } 100% { transform: perspective(600px) rotateX(75deg) translateY(50px); } }
        .scanline { position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 8px; pointer-events: none; z-index: 10; opacity: 0.4; }

        /* --- MENÜ --- */
        #mode-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .lobby-frame { width: 90%; max-width: 450px; padding: clamp(20px, 4vh, 40px) 20px; border-radius: 20px; background: linear-gradient(145deg, rgba(15,15,25,0.9), rgba(5,5,10,1)); border: 1px solid rgba(0, 210, 255, 0.3); box-shadow: 0 0 50px rgba(0,0,0,0.8); text-align: center; }
        .mode-title { font-family: 'Orbitron'; color: #fff; font-size: clamp(1.5rem, 6vw, 2.2rem); margin-bottom: 5px; text-shadow: 0 0 20px var(--cyan); }
        .mode-subtitle { color: var(--cyan); font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 25px; }
        .mode-btn { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: white; font-family: 'Orbitron'; font-size: clamp(0.9rem, 4vw, 1.1rem); padding: 15px; margin: 10px 0; border-radius: 12px; cursor: pointer; width: 100%; transition: 0.3s; }
        .mode-btn span { display: block; font-size: 0.7rem; color: #ccc; font-family: 'Rajdhani'; margin-top: 5px; }

        /* --- ÜST PANEL --- */
        .top-nav { height: clamp(45px, 6vh, 60px); background: rgba(0,0,0,0.7); border-bottom: 1px solid rgba(0,210,255,0.3); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 50; }
        .nav-logo { font-family: 'Orbitron'; font-weight: 900; color: var(--neon); font-size: clamp(0.9rem, 4vw, 1.2rem); }
        .exit-btn { color: var(--danger); text-decoration: none; font-family: 'Orbitron'; font-size: 0.7rem; border: 1px solid var(--danger); padding: 4px 10px; border-radius: 6px; }

        /* --- ANA ARENA --- */
        /* padding-bottom: env() özelliği iPhone alt çizgisine (Home Indicator) çarpmasını önler */
        .battle-arena { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            padding: 10px 15px calc(15px + env(safe-area-inset-bottom)) 15px; 
            width: 100%; max-width: 900px; margin: 0 auto; display: none; position: relative; 
        }

        /* SKORBOARD */
        .scoreboard { width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: clamp(5px, 1.5vh, 10px); margin-bottom: 5px; }
        .sb-player { flex: 1; text-align: center; }
        .sb-name { font-family: 'Orbitron'; font-size: clamp(0.6rem, 2.5vw, 0.8rem); color: #ddd; margin-bottom: 2px; }
        .sb-score { font-family: 'Orbitron'; font-size: clamp(1.8rem, 6vw, 2.5rem); font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 0 10px var(--cyan); }
        .sb-center { padding: 0 10px; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); }
        .round-badge { background: linear-gradient(45deg, var(--gold), #ff8800); color: black; font-family: 'Orbitron'; font-weight: 900; padding: 4px 10px; border-radius: 20px; font-size: clamp(0.7rem, 3vw, 0.9rem); }

        /* CAN BARLARI */
        .health-container { width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
        .hp-wrap { flex: 1; height: clamp(16px, 3vh, 22px); background: #000; border: 1px solid #333; border-radius: 10px; position: relative; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #00ffcc); width: 100%; transition: width 0.3s ease; }
        .hp-enemy { background: linear-gradient(-90deg, #ff0055, #ff5555); float: right; }
        .hp-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: clamp(0.7rem, 2.5vw, 0.9rem); font-weight: 900; z-index: 5; text-shadow: 1px 1px 2px black; }

        /* ÇARPIŞMA EKRANI */
        .clash-zone { width: 100%; display: flex; justify-content: space-around; align-items: center; flex: 1; min-height: 0; }
        .fighter-col { display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .avatar-box { 
            font-size: clamp(2rem, 8vw, 4rem); display: flex; align-items: center; justify-content: center;
            width: clamp(60px, 15vw, 110px); height: clamp(60px, 15vw, 110px); border-radius: 50%;
            background: rgba(0,0,0,0.5); border: 2px solid var(--neon); box-shadow: 0 0 15px rgba(0,255,136,0.2);
            overflow: hidden;
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .hit-power-display { font-family: 'Orbitron'; font-size: clamp(2rem, 7vw, 4rem); font-weight: 900; position: absolute; top: 100%; opacity: 0; transform: scale(0.5); transition: 0.3s; z-index: 20; }
        .hit-power-display.show { opacity: 1; transform: scale(1); color: white; }
        .hit-power-display.winner { color: var(--neon); text-shadow: 0 0 20px var(--neon); transform: scale(1.2); }
        .hit-power-display.loser { color: var(--danger); opacity: 0.5; transform: scale(0.8); }

        .vs-text { font-family: 'Orbitron'; font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 900; color: #555; font-style: italic; }

        .impact-wave { position: absolute; width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle, white, transparent); animation: shockwave 0.4s ease-out forwards; pointer-events: none; z-index: 15; left: 50%; top: 50%; transform: translate(-50%, -50%); opacity: 0; }
        @keyframes shockwave { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 300px; height: 300px; opacity: 0; } }

        .dmg-text { position: absolute; font-family: 'Orbitron'; font-weight: 900; font-size: clamp(1.8rem, 6vw, 3rem); animation: floatDmg 0.8s ease-out forwards; pointer-events: none; z-index: 100; text-shadow: 0 0 15px currentColor; }
        @keyframes floatDmg { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-50px) scale(1.4); opacity: 0; } }

        /* GÜÇ ÖLÇER BAR */
        .power-system { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: auto; margin-bottom: clamp(10px, 2vh, 20px); }
        .meter-bg { width: 100%; max-width: 600px; height: clamp(25px, 5vh, 40px); background: #000; border: 2px solid rgba(255,255,255,0.2); border-radius: 15px; overflow: hidden; position: relative; }
        #power-fill { position: absolute; left: 0; height: 100%; width: 0%; background: linear-gradient(90deg, #00d2ff, #00ff88, #ffcf00, #ff0055); transition: none; }

        /* KONTROLLER VE BUTON */
        .control-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        #msg-box { font-family: 'Orbitron'; font-size: clamp(0.85rem, 3vw, 1.1rem); color: white; height: 20px; }
        
        .hit-btn { 
            width: 100%; max-width: 400px; 
            padding: clamp(12px, 2.5vh, 20px); /* Mobil için padding daraltıldı */
            background: linear-gradient(45deg, var(--neon), var(--cyan)); color: black; border: none; 
            font-family: 'Orbitron'; font-weight: 900; font-size: clamp(1.3rem, 5vw, 1.8rem); /* Font küçültüldü */
            border-radius: 12px; cursor: pointer; transition: 0.1s;
            box-shadow: 0 6px 0 #007799; /* Gölge kısaltıldı */
        }
        .hit-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #007799; background: white; }
        .hit-btn:disabled { background: #222; color: #555; box-shadow: none; cursor: not-allowed; transform: none; }

        .shake-screen { animation: shakeEffect 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeEffect { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(3px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body>
    <div class="bg-core"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="cyber-grid"></div>
    <div class="scanline"></div>

    <div id="mode-overlay">
        <div class="lobby-frame">
            <h2 class="mode-title">NEON ARENA</h2>
            <p class="mode-subtitle">SAVAŞ MODUNU SEÇ</p>
            <button class="mode-btn" onclick="startGame('bot')">YAPAY ZEKA DÜELLOSU <span>[BOTA KARŞI TEK OYUNCU]</span></button>
            <button class="mode-btn btn-local" onclick="startGame('local')" style="border-color: var(--cyan); color: var(--cyan);">SİNİR AĞI ÇARPIŞMASI <span>[AYNI EKRANDA İKİ OYUNCU]</span></button>
        </div>
    </div>

    <nav class="top-nav">
        <div class="nav-logo">POWER BATTLE</div>
        <a href="/" class="exit-btn">SİSTEMDEN ÇIK</a>
    </nav>

    <div class="battle-arena" id="arena-box">
        
        <div class="scoreboard">
            <div class="sb-player">
                <div class="sb-name" id="p1-name-ui">OPERATÖR</div>
                <div class="sb-score" id="p1-score">0</div>
            </div>
            <div class="sb-center">
                <div class="round-badge" id="round-badge">ROUND 1</div>
            </div>
            <div class="sb-player">
                <div class="sb-name" id="p2-name-ui">BOT_X</div>
                <div class="sb-score" id="p2-score">0</div>
            </div>
        </div>

        <div class="health-container">
            <div class="hp-wrap">
                <div id="p1-hp" class="hp-fill"></div>
                <div id="p1-hp-text" class="hp-text">150 / 150</div>
            </div>
            <div style="font-family:'Orbitron'; font-size:clamp(0.7rem, 2vw, 0.9rem); color:#ccc; font-weight:900;">HP</div>
            <div class="hp-wrap">
                <div id="p2-hp" class="hp-fill hp-enemy"></div>
                <div id="p2-hp-text" class="hp-text">150 / 150</div>
            </div>
        </div>

        <div class="clash-zone" id="clash-center">
            <div class="fighter-col" id="p1-col">
                <div class="avatar-box" id="p1-avatar">⚡</div>
                <div class="hit-power-display" id="p1-power-text">0</div>
            </div>
            <div class="vs-text">VS</div>
            <div class="fighter-col" id="p2-col">
                <div class="avatar-box" id="p2-avatar" style="border-color: var(--danger);">🤖</div>
                <div class="hit-power-display" id="p2-power-text">0</div>
            </div>
        </div>

        <div class="power-system">
            <div style="font-size: clamp(0.6rem, 2vw, 0.8rem); font-family: 'Orbitron'; color: #fff; letter-spacing: 2px;">GÜÇ SEVİYESİ</div>
            <div class="meter-bg"><div id="power-fill"></div></div>
        </div>

        <div class="control-area">
            <div id="msg-box">KOMUT BEKLENİYOR...</div>
            <button id="hit-btn" class="hit-btn" onclick="executeHit()">ATEŞLE!</button>
        </div>

    </div>

    <script src="games/battle.js"></script>
</body>
</html>
