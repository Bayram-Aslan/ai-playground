<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POWER BATTLE | NEON ARENA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00ff88; --danger: #ff0055; --gold: #ffcf00; 
            --cyan: #00d2ff; --purple: #b026ff; --bg: #030305; 
            --glass: rgba(255, 255, 255, 0.05); 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }

        /* --- RENKLİ VE HAREKETLİ ARKA PLAN --- */
        .bg-core { position: fixed; inset: 0; z-index: -5; background: #020204; }
        
        /* Renkli Parlayan Küreler */
        .orb { position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.3; z-index: -4; animation: floatOrb 10s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 300px; height: 300px; background: var(--cyan); top: 10%; left: 10%; }
        .orb-2 { width: 250px; height: 250px; background: var(--purple); bottom: 10%; right: 10%; animation-delay: -3s; }
        .orb-3 { width: 350px; height: 350px; background: var(--neon); top: 40%; left: 50%; transform: translateX(-50%); animation-delay: -5s; }
        
        @keyframes floatOrb { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-50px) scale(1.2); } }

        .cyber-grid { 
            position: fixed; bottom: -50%; left: -50%; width: 200%; height: 150%; z-index: -3;
            background-image: 
                linear-gradient(rgba(0, 210, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(600px) rotateX(75deg);
            animation: gridFlow 10s linear infinite;
        }
        @keyframes gridFlow { 0% { transform: perspective(600px) rotateX(75deg) translateY(0); } 100% { transform: perspective(600px) rotateX(75deg) translateY(50px); } }
        
        .scanline { position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 8px; pointer-events: none; z-index: 10; opacity: 0.4; }

        /* --- HOLOGRAFİK GİRİŞ MENÜSÜ --- */
        #mode-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }
        .lobby-frame {
            width: 90%; max-width: 450px; padding: 40px 30px; border-radius: 20px;
            background: linear-gradient(145deg, rgba(15,15,25,0.9), rgba(5,5,10,1));
            border: 1px solid rgba(0, 210, 255, 0.3); box-shadow: 0 0 50px rgba(0,0,0,0.8);
            text-align: center; position: relative; overflow: hidden;
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .lobby-frame::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--cyan), var(--purple), var(--neon), transparent);
            animation: rotateBorder 4s linear infinite; z-index: -1; opacity: 0.4;
        }
        @keyframes rotateBorder { 100% { transform: rotate(360deg); } }

        .mode-title { font-family: 'Orbitron'; color: #fff; font-size: 2.2rem; margin-bottom: 5px; letter-spacing: 3px; text-shadow: 0 0 20px var(--cyan); }
        .mode-subtitle { color: var(--cyan); font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 35px; font-weight: 800; }
        
        .mode-btn { 
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: white;
            font-family: 'Orbitron'; font-size: 1.1rem; font-weight: 900; padding: 20px; margin: 15px 0;
            border-radius: 12px; cursor: pointer; transition: 0.3s; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 5px;
            position: relative; overflow: hidden;
        }
        .mode-btn:hover { background: rgba(0, 255, 136, 0.15); border-color: var(--neon); transform: scale(1.05); color: var(--neon); box-shadow: 0 0 25px rgba(0,255,136,0.4); }
        .mode-btn span { font-size: 0.75rem; color: #ccc; font-family: 'Rajdhani'; font-weight: 700; letter-spacing: 1px; }
        .btn-local:hover { background: rgba(0, 210, 255, 0.15); border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 25px rgba(0,210,255,0.4); }

        /* --- ÜST PANEL --- */
        .top-nav { height: 60px; background: rgba(0,0,0,0.7); border-bottom: 1px solid rgba(0,210,255,0.3); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .nav-logo { font-family: 'Orbitron'; font-weight: 900; background: linear-gradient(90deg, var(--neon), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; font-size: 1.2rem; filter: drop-shadow(0 0 5px rgba(0,255,136,0.5)); }
        .exit-btn { background: transparent; color: var(--danger); text-decoration: none; font-family: 'Orbitron'; font-size: 0.8rem; font-weight: 900; border: 1px solid var(--danger); padding: 6px 14px; border-radius: 6px; transition: 0.3s; }
        .exit-btn:hover { background: var(--danger); color: white; box-shadow: 0 0 15px var(--danger); }

        /* --- ANA ARENA --- */
        .battle-arena { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 15px; width: 100%; max-width: 900px; margin: 0 auto; display: none; position: relative; }

        /* SKORBOARD */
        .scoreboard { 
            width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 10px; backdrop-filter: blur(10px);
        }
        .sb-player { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .sb-name { font-family: 'Orbitron'; font-size: 0.8rem; color: #ddd; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
        .sb-score { font-family: 'Orbitron'; font-size: 2.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--cyan); line-height: 1; }
        .sb-center { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 15px; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); }
        .round-badge { background: linear-gradient(45deg, var(--gold), #ff8800); color: black; font-family: 'Orbitron'; font-weight: 900; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; letter-spacing: 1px; box-shadow: 0 0 15px rgba(255,215,0,0.6); }

        /* CAN BARLARI */
        .health-container { width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 15px; }
        .hp-wrap { flex: 1; height: 22px; background: #000; border: 1px solid #333; border-radius: 15px; overflow: hidden; position: relative; box-shadow: inset 0 0 10px #000, 0 0 10px rgba(0,0,0,0.5); }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #00ffcc); width: 100%; transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 20px var(--neon); }
        .hp-enemy { background: linear-gradient(-90deg, #ff0055, #ff5555); box-shadow: 0 0 20px var(--danger); float: right; }
        .hp-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 0.9rem; font-weight: 900; z-index: 5; text-shadow: 1px 1px 3px black, 0 0 5px black; }

        /* ÇARPIŞMA (VS) EKRANI & RENKLİ AVATARLAR */
        .clash-zone { width: 100%; display: flex; justify-content: space-around; align-items: center; flex: 1; position: relative; }
        .fighter-col { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 33%; position: relative; }
        
        .avatar-box { 
            font-size: clamp(3rem, 10vw, 4.5rem); display: flex; align-items: center; justify-content: center;
            width: clamp(80px, 18vw, 120px); height: clamp(80px, 18vw, 120px); border-radius: 50%;
            background: rgba(0,0,0,0.5); border: 3px solid var(--neon); box-shadow: 0 0 30px rgba(0,255,136,0.3), inset 0 0 20px rgba(0,255,136,0.2);
            position: relative; overflow: hidden;
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .hit-power-display { 
            font-family: 'Orbitron'; font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900; 
            color: #333; text-shadow: 0 0 10px rgba(0,0,0,0.8); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            opacity: 0; transform: scale(0.5) translateY(20px); position: absolute; top: 105%; z-index: 20;
        }
        .hit-power-display.show { opacity: 1; transform: scale(1) translateY(0); color: white; }
        .hit-power-display.winner { color: var(--neon); text-shadow: 0 0 40px var(--neon); transform: scale(1.3) translateY(0); }
        .hit-power-display.loser { color: var(--danger); text-shadow: 0 0 20px var(--danger); opacity: 0.5; transform: scale(0.8) translateY(0); }

        .vs-text { font-family: 'Orbitron'; font-size: clamp(2rem, 6vw, 3rem); font-weight: 900; color: #555; font-style: italic; text-shadow: 0 0 10px #000; z-index: 10; }

        /* YENİ: ÇARPIŞMA ŞOK DALGASI (IMPACT) */
        .impact-wave {
            position: absolute; width: 50px; height: 50px; border-radius: 50%; 
            background: radial-gradient(circle, white, transparent); mix-blend-mode: screen;
            animation: shockwave 0.5s ease-out forwards; pointer-events: none; z-index: 15;
            left: 50%; top: 50%; transform: translate(-50%, -50%); opacity: 0;
        }
        @keyframes shockwave { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 400px; height: 400px; opacity: 0; } }

        /* UÇAN HASAR YAZISI */
        .dmg-text { 
            position: absolute; font-family: 'Orbitron'; font-weight: 900; font-size: clamp(2.5rem, 7vw, 3.5rem); 
            animation: floatDmg 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            pointer-events: none; z-index: 100; text-shadow: 0 0 25px currentColor, 2px 2px 4px black; 
        }
        @keyframes floatDmg { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-80px) scale(1.6); opacity: 0; } }

        /* GÜÇ ÖLÇER BAR (RENK ŞÖLENİ) */
        .power-system { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 5px; margin-bottom: 15px; margin-top: 30px; }
        .meter-bg { width: 100%; max-width: 600px; height: 40px; background: #000; border: 2px solid rgba(255,255,255,0.2); border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        /* Renkli Gökkuşağı Gradienti */
        #power-fill { position: absolute; left: 0; height: 100%; width: 0%; background: linear-gradient(90deg, #00d2ff, #00ff88, #ffcf00, #ff0055); box-shadow: 0 0 15px rgba(255,255,255,0.5); transition: none; }

        /* KONTROLLER */
        .control-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #msg-box { font-family: 'Orbitron'; font-weight: 700; font-size: clamp(1rem, 3.5vw, 1.2rem); color: white; height: 24px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 5px #000; }
        .hit-btn { 
            width: 100%; max-width: 400px; padding: 20px; 
            background: linear-gradient(45deg, var(--neon), var(--cyan)); color: black; border: none; 
            font-family: 'Orbitron'; font-weight: 900; font-size: clamp(1.6rem, 6vw, 2rem); letter-spacing: 4px;
            border-radius: 15px; cursor: pointer; transition: 0.1s;
            box-shadow: 0 8px 0 #007799, 0 15px 30px rgba(0,255,136,0.5), inset 0 0 15px rgba(255,255,255,0.4);
        }
        .hit-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #007799, 0 5px 15px rgba(0,255,136,0.6); background: white; }
        .hit-btn:disabled { background: #222; color: #555; box-shadow: none; transform: none; cursor: not-allowed; }

        /* SARSINTI */
        .shake-screen { animation: shakeEffect 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeEffect { 10%, 90% { transform: translate3d(-4px, 0, 0); } 20%, 80% { transform: translate3d(5px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-8px, 0, 0); } 40%, 60% { transform: translate3d(8px, 0, 0); } }
    </style>
</head>
<body>
    <div class="bg-core"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="cyber-grid"></div>
    <div class="scanline"></div>

    <div id="mode-overlay">
        <div class="lobby-frame">
            <h2 class="mode-title">NEON ARENA</h2>
            <p class="mode-subtitle">SAVAŞ MODUNU SEÇ</p>
            
            <button class="mode-btn" onclick="startGame('bot')">
                YAPAY ZEKA DÜELLOSU
                <span>[BOTA KARŞI TEK OYUNCU]</span>
            </button>
            
            <button class="mode-btn btn-local" onclick="startGame('local')">
                SİNİR AĞI ÇARPIŞMASI
                <span>[AYNI EKRANDA İKİ OYUNCU]</span>
            </button>
        </div>
    </div>

    <nav class="top-nav">
        <div class="nav-logo">POWER BATTLE</div>
        <a href="/" class="exit-btn">SİSTEMDEN ÇIK</a>
    </nav>

    <div class="battle-arena" id="arena-box">
        
        <div class="scoreboard">
            <div class="sb-player">
                <div class="sb-name" id="p1-name-ui">OPERATÖR</div>
                <div class="sb-score" id="p1-score">0</div>
            </div>
            <div class="sb-center">
                <div class="round-badge" id="round-badge">ROUND 1</div>
            </div>
            <div class="sb-player">
                <div class="sb-name" id="p2-name-ui">BOT_X</div>
                <div class="sb-score" id="p2-score">0</div>
            </div>
        </div>

        <div class="health-container">
            <div class="hp-wrap">
                <div id="p1-hp" class="hp-fill"></div>
                <div id="p1-hp-text" class="hp-text">150 / 150</div>
            </div>
            <div style="font-family:'Orbitron'; font-size:0.9rem; color:#ccc; font-weight:900;">HP</div>
            <div class="hp-wrap">
                <div id="p2-hp" class="hp-fill hp-enemy"></div>
                <div id="p2-hp-text" class="hp-text">150 / 150</div>
            </div>
        </div>

        <div class="clash-zone" id="clash-center">
            <div class="fighter-col" id="p1-col">
                <div class="avatar-box" id="p1-avatar">⚡</div>
                <div class="hit-power-display" id="p1-power-text">0</div>
            </div>
            
            <div class="vs-text">VS</div>

            <div class="fighter-col" id="p2-col">
                <div class="avatar-box" id="p2-avatar" style="border-color: var(--danger); box-shadow: 0 0 30px rgba(255,0,85,0.3), inset 0 0 20px rgba(255,0,85,0.2);">🤖</div>
                <div class="hit-power-display" id="p2-power-text">0</div>
            </div>
        </div>

        <div class="power-system">
            <div style="font-size: 0.8rem; font-family: 'Orbitron'; color: #fff; letter-spacing: 3px; margin-bottom: 2px;">GÜÇ SEVİYESİ</div>
            <div class="meter-bg"><div id="power-fill"></div></div>
        </div>

        <div class="control-area">
            <div id="msg-box">KOMUT BEKLENİYOR...</div>
            <button id="hit-btn" class="hit-btn" onclick="executeHit()">ATEŞLE!</button>
        </div>

    </div>

    <script src="games/battle.js"></script>
</body>
</html>
