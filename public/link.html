<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON LINK | ZEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #010103; --neon: #00ff88; --cyan: #00d2ff; --pink: #ff0055; --gold: #ffcf00; }
        * { box-sizing: border-box; touch-action: none; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif;
            height: 100dvh; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        /* Arka Plan Efekti */
        .bg-fx { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0a0d1a 0%, #010103 100%); }
        .grid { position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 30px 30px; }

        /* Ana Kapsayıcı */
        .app-container {
            flex: 1; width: 100%; max-width: 1000px; display: flex; flex-direction: column; position: relative;
        }

        /* Üst Panel */
        .nav {
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.3);
        }
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 1rem; color: var(--cyan); letter-spacing: 2px; }
        .lvl-badge { font-family: 'Orbitron'; color: var(--gold); font-size: 0.75rem; border: 1px solid var(--gold); padding: 2px 10px; border-radius: 4px; }

        /* Oyun Sahası */
        #stage { flex: 1; position: relative; width: 100%; overflow: hidden; cursor: crosshair; }
        canvas { display: block; width: 100%; height: 100%; }

        /* Alt Panel */
        .bar {
            padding: 15px 20px; border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 10px; background: rgba(0,0,0,0.4);
        }
        #msg { font-size: 0.8rem; color: #666; letter-spacing: 1px; text-transform: uppercase; height: 18px; }
        .ctrls { display: flex; gap: 10px; width: 100%; max-width: 300px; }
        .btn {
            flex: 1; padding: 10px; border: 1px solid #333; background: transparent;
            color: #999; font-family: 'Orbitron'; font-weight: 700; font-size: 0.75rem; 
            border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        .btn:active { background: rgba(255,255,255,0.1); color: white; }
        .btn-red { border-color: rgba(255,0,85,0.3); color: var(--pink); }

        /* Zarif Win Popup */
        #win-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15,20,30,0.95); border: 1px solid var(--neon);
            padding: 30px 20px; border-radius: 16px; z-index: 1000;
            display: none; flex-direction: column; align-items: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            backdrop-filter: blur(12px); width: 85%; max-width: 280px;
        }
        .win-title { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--neon); margin-bottom: 25px; letter-spacing: 1px; text-align: center; }
        .btn-go { 
            width: 100%; padding: 14px; background: var(--neon); color: black; 
            border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: 900; font-size: 0.85rem; cursor: pointer;
        }

        @media (max-width: 480px) {
            .nav { padding: 8px 15px; }
            .bar { padding: 12px 15px; }
        }
    </style>
</head>
<body>
    <div class="bg-fx"></div>
    <div class="grid"></div>

    <div class="app-container">
        <div class="nav">
            <div class="logo">NEON LINK</div>
            <div id="lvl-txt" class="lvl-badge">LEVEL 1</div>
        </div>

        <div id="stage">
            <canvas id="canvas"></canvas>
            
            <div id="win-card">
                <div class="win-title">BAĞLANTI TAMAMLANDI</div>
                <button class="btn-go" onclick="next()">SIRADAKİ GÖREV</button>
            </div>
        </div>

        <div class="bar">
            <div id="msg">YOLLARI KESİŞTİRMEDEN BİRLEŞTİR</div>
            <div class="ctrls">
                <button class="btn btn-red" onclick="reset()">SIFIRLA</button>
                <a href="/" style="flex:1;"><button class="btn" style="width:100%">AYRIL</button></a>
            </div>
        </div>
    </div>

    <script src="games/link.js"></script>
</body>
</html>
