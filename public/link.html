<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON LINK | ARENA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #050505; }
        body { background: var(--bg); margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; touch-action: none; display: flex; flex-direction: column; height: 100vh; }
        
        .ui { padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        #level-display { color: var(--neon); font-size: 1.5rem; }

        canvas { display: block; margin: auto; background: #080808; border: 2px solid #111; border-radius: 15px; cursor: crosshair; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .btn { background: var(--neon); color: black; border: none; padding: 15px 40px; font-size: 1.5rem; font-family: 'Orbitron'; cursor: pointer; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="ui">
        <div id="level-display">LEVEL: 1</div>
        <a href="/" style="color: #555; text-decoration: none; font-size: 0.7rem;">LOBİYE DÖN</a>
    </div>

    <div id="start-screen" class="overlay">
        <h1 style="color:white; letter-spacing:10px;">NEON LINK</h1>
        <p style="color:var(--neon);">RENKLERİ BİRLEŞTİR, HATLARI ÇAKIŞTIRMA!</p>
        <button class="btn" onclick="startLinkGame()">SİSTEMİ KUR</button>
    </div>

    <canvas id="linkCanvas"></canvas>

    <script src="games/link.js"></script>
</body>
</html>
