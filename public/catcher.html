<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARENA | ELITE CATCHER FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --water: #0099ff; --acid: #ff8c00; --sky: #87CEEB; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; padding: 0; background: var(--sky); 
            color: white; font-family: 'Orbitron', sans-serif; 
            overflow: hidden; touch-action: none; 
            width: 100vw; height: 100vh;
        }

        /* Üst Bar Düzenlemesi (Safe Area Fix) */
        .game-nav {
            position: fixed; 
            top: env(safe-area-inset-top, 20px); /* Modern telefonlar için çentik payı */
            left: 0; width: 100%; 
            padding: 10px 25px;
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000;
            background: rgba(0,0,0,0.1);
        }

        #score-num { font-size: clamp(1.8rem, 6vw, 2.8rem); color: #fff; text-shadow: 2px 2px 8px rgba(0,0,0,0.3); font-weight: 900; }
        #lives-display { font-size: clamp(1.2rem, 4vw, 1.8rem); letter-spacing: 5px; color: #ff3366; }

        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        .btn-lobi {
            color: #fff; text-decoration: none; font-size: 0.8rem; 
            border: 1.5px solid #fff; padding: 6px 15px; border-radius: 10px;
            background: rgba(0,0,0,0.2); transition: 0.3s;
        }

        /* Overlay Paneli */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2000; padding: 20px;
        }
        .box { text-align: center; background: #fff; color: #000; padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; }
        .btn-restart { background: #0099ff; color: #fff; border: none; padding: 18px; font-family: 'Orbitron'; font-weight: 900; border-radius: 15px; cursor: pointer; margin-top: 25px; width: 100%; font-size: 1.2rem; }

        .shake { animation: shake 0.25s; }
        @keyframes shake { 0% { transform:translate(5px,5px); } 50% { transform:translate(-5px,-5px); } 100% { transform:translate(0,0); } }
    </style>
</head>
<body id="game-body">

    <div class="game-nav">
        <a href="/" class="btn-lobi">LOBİ</a>
        <div id="score-num">0</div>
        <div id="lives-display">❤❤❤</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay">
        <div class="box">
            <h2 id="end-msg" style="margin:0;">ŞEHİR BOĞULDU</h2>
            <p id="final-res" style="font-size: 4rem; margin: 15px 0; font-weight: 900; color: #0099ff;">0</p>
            <button class="btn-restart" onclick="resetGame()">YENİDEN DENE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const body = document.getElementById('game-body');
        
        let score = 0, lives = 3, gameActive = true;
        let elements = [], clouds = [], particles = [];
        let speedBase = 3.5, spawnInterval = 1000, lastSpawn = 0;
        let waterLevel = 60, targetWaterLevel = 60; // Başlangıç su seviyesi (iPad fix)

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initEnvironment();
        }

        function initEnvironment() {
            clouds = [];
            // Tabletlerde daha çok bulut olsun diye sayı artırıldı
            const cloudCount = canvas.width > 800 ? 6 : 4;
            for(let i=0; i < cloudCount; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: 60 + Math.random() * 100, // Üstten biraz daha aşağıda
                    w: 120 + Math.random() * 120,
                    h: 40 + Math.random() * 25,
                    s: 0.2 + Math.random() * 0.4
                });
            }
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 10;
                this.speedY = (Math.random() - 0.5) * 10;
                this.color = color; this.alpha = 1;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= 0.04; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        class RainDrop {
            constructor() {
                // Tablet ve PC için damla boyutunu optimize et
                this.size = Math.min(canvas.width * 0.07, 50); 
                this.x = Math.random() * (canvas.width - this.size);
                this.y = -100;
                this.type = Math.random() > 0.22 ? 'water' : 'acid';
                this.speed = speedBase + Math.random() * 3;
                this.color = this.type === 'water' ? '#ffffff' : '#ff8c00';
            }
            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.bezierCurveTo(this.x - this.size/2, this.y + this.size, this.x + this.size/2, this.y + this.size, this.x, this.y);
                ctx.fill();
                ctx.restore();
            }
            update() { this.y += this.speed; }
        }

        function handleInput(e) {
            if(!gameActive) return;
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);

            for (let i = elements.length - 1; i >= 0; i--) {
                let el = elements[i];
                // Hitbox Genişletme (Tıklama kolaylığı)
                if(x >= el.x - 40 && x <= el.x + 40 && y >= el.y - 10 && y <= el.y + 80) {
                    for(let j=0; j<10; j++) particles.push(new Particle(el.x, el.y + 20, el.color));
                    
                    if(el.type === 'water') {
                        score += 10;
                        targetWaterLevel = Math.max(60, targetWaterLevel - 15);
                        speedBase += 0.03;
                        spawnInterval = Math.max(450, spawnInterval - 8);
                        document.getElementById('score-num').innerText = score;
                    } else { 
                        lives--; 
                        updateLives();
                        body.classList.add('shake');
                        setTimeout(() => body.classList.remove('shake'), 200);
                        if(lives <= 0) gameOver("ASİT YAĞMURU DURDURULAMADI");
                    }
                    elements.splice(i, 1);
                    break;
                }
            }
        }

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});

        function update(time) {
            if(!gameActive) return;
            
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Bulutlar
            ctx.fillStyle = 'rgba(255,255,255,0.75)';
            clouds.forEach(c => {
                ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w/2, c.h/2, 0, 0, Math.PI*2); ctx.fill();
                c.x += c.s; if(c.x - c.w/2 > canvas.width) c.x = -c.w/2;
            });

            // Yumuşak Su Yükselmesi
            waterLevel += (targetWaterLevel - waterLevel) * 0.08;

            if (time - lastSpawn > spawnInterval && elements.length < 15) {
                elements.push(new RainDrop());
                lastSpawn = time;
            }

            particles.forEach((p, i) => {
                p.update(); p.draw();
                if(p.alpha <= 0) particles.splice(i, 1);
            });

            for (let i = elements.length - 1; i >= 0; i--) {
                let el = elements[i];
                el.update(); el.draw();
                if(el.y > canvas.height - waterLevel) {
                    if(el.type === 'water') targetWaterLevel += 30;
                    elements.splice(i, 1);
                }
            }

            // SUYU ÇİZ (Daha şeffaf ve canlı)
            ctx.fillStyle = 'rgba(0, 153, 255, 0.7)';
            ctx.fillRect(0, canvas.height - waterLevel, canvas.width, waterLevel);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.beginPath();
            for(let i=0; i<canvas.width; i+=25) {
                ctx.lineTo(i, canvas.height - waterLevel + Math.sin(Date.now()/300 + i/60)*6);
            }
            ctx.stroke();

            // TAŞMA KONTROLÜ
            if(waterLevel >= canvas.height * 0.85) gameOver("ŞEHİR SULAR ALTINDA");

            requestAnimationFrame(update);
        }

        function updateLives() {
            document.getElementById('lives-display').innerText = "❤".repeat(Math.max(0, lives));
        }

        function gameOver(msg) {
            gameActive = false;
            document.getElementById('end-msg').innerText = msg;
            document.getElementById('final-res').innerText = score;
            document.getElementById('overlay').style.display = 'flex';
        }

        function resetGame() {
            score = 0; lives = 3; waterLevel = 60; targetWaterLevel = 60; speedBase = 3.5; spawnInterval = 1000;
            elements = []; particles = [];
            gameActive = true; updateLives();
            document.getElementById('score-num').innerText = "0";
            document.getElementById('overlay').style.display = 'none';
            requestAnimationFrame(update);
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
