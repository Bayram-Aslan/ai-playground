<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARENA | CONSTANT TENSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --water: #0099ff; --acid: #ff4500; --sky: #0a0a12; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #000; background-image: url('bg.png'); background-position: center bottom; background-repeat: no-repeat; background-size: cover; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: none; width: 100vw; height: 100vh; }
        .game-nav { position: fixed; top: env(safe-area-inset-top, 20px); left: 50%; transform: translateX(-50%); width: 100%; max-width: 1200px; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        #score-num { font-size: clamp(1.8rem, 6vw, 3rem); color: #fff; text-shadow: 0 0 10px var(--water); font-weight: 900; }
        #lives-display { font-size: clamp(1.2rem, 4vw, 2rem); color: var(--acid); letter-spacing: 5px; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .btn-lobi { color: #fff; text-decoration: none; font-size: 0.8rem; border: 1.5px solid #fff; padding: 5px 15px; border-radius: 8px; background: rgba(0,0,0,0.4); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .box { text-align: center; border: 2px solid var(--water); padding: 40px; border-radius: 30px; background: #000; width: 90%; max-width: 400px; }
        .btn-restart { background: var(--water); color: #fff; border: none; padding: 18px; font-weight: 900; border-radius: 15px; cursor: pointer; margin-top: 25px; width: 100%; font-size: 1.2rem; font-family: 'Orbitron'; }
    </style>
</head>
<body id="game-body">

    <div class="game-nav">
        <a href="/" class="btn-lobi">LOBİ</a>
        <div id="score-num">0</div>
        <div id="lives-display">❤❤❤</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay">
        <div class="box">
            <h2 id="end-msg">OPERASYON BAŞARISIZ</h2>
            <p id="final-res" style="font-size: 4rem; color: var(--water); font-weight: 900; margin: 15px 0;">0</p>
            <button class="btn-restart" onclick="resetGame()">YENİDEN BAŞLAT</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const body = document.getElementById('game-body');
        
        let score = 0, lives = 3, gameActive = true;
        let elements = [], particles = [];
        
        // GERİLİM PARAMETRELERİ
        let speedBase = 3.8;
        let spawnInterval = 650; // Yağmur baştan itibaren SIK
        let lastSpawn = 0;
        let waterLevel = 70, targetWaterLevel = 70;
        let difficultyMultiplier = 1;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class RainDrop {
            constructor() {
                this.size = Math.min(canvas.width * 0.08, 42);
                const margin = canvas.width * 0.12;
                this.x = margin + Math.random() * (canvas.width - this.size - (margin * 2));
                this.y = -80;
                
                // Asit oranı yavaş yavaş artar
                this.type = Math.random() < (0.15 + (score * 0.0003)) ? 'acid' : 'water';
                this.speed = speedBase + (score * 0.004) + (Math.random() * 2.5);
                this.color = this.type === 'water' ? '#ffffff' : '#ff4500';
            }
            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8; ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.bezierCurveTo(this.x - this.size/2, this.y + this.size, this.x + this.size/2, this.y + this.size, this.x, this.y);
                ctx.fill();
                ctx.restore();
            }
            update() { this.y += this.speed; }
        }

        function handleInput(e) {
            if(!gameActive) return;
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            const x = clientX - canvas.getBoundingClientRect().left;
            const y = clientY - canvas.getBoundingClientRect().top;

            for (let i = elements.length - 1; i >= 0; i--) {
                let el = elements[i];
                if(x >= el.x - 55 && x <= el.x + 55 && y >= el.y - 20 && y <= el.y + 90) {
                    if(el.type === 'water') {
                        // XP YAVAŞ ARTAR (Gerilim uzasın diye)
                        score += 5; 
                        // Su indirme gücü (Skor arttıkça verim düşer)
                        const drainEffect = Math.max(6, 14 - (score * 0.01));
                        targetWaterLevel = Math.max(70, targetWaterLevel - drainEffect);
                        document.getElementById('score-num').innerText = score;
                    } else { 
                        lives--; updateLives();
                        if(lives <= 0) gameOver("ASİT SİSTEMİ ERİTTİ");
                    }
                    elements.splice(i, 1);
                    break;
                }
            }
        }

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});

        function update(time) {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Su seviyesi yumuşak ama sürekli hareketli
            waterLevel += (targetWaterLevel - waterLevel) * 0.07;

            // Sıklık skora göre yavaşça limitlere dayanır
            let dynamicSpawn = Math.max(280, spawnInterval - (score * 0.4));
            
            if (time - lastSpawn > dynamicSpawn && elements.length < 25) {
                elements.push(new RainDrop());
                lastSpawn = time;
            }

            for (let i = elements.length - 1; i >= 0; i--) {
                let el = elements[i];
                el.update(); el.draw();
                if(el.y > canvas.height - waterLevel) {
                    if(el.type === 'water') {
                        // KAÇIRMA CEZASI: Yavaş yavaş ama artan şiddetle
                        const leakPenalty = 28 + (score * 0.04);
                        targetWaterLevel += leakPenalty;
                    }
                    elements.splice(i, 1);
                }
            }

            // SUYU ÇİZ (Sürekli hareketli)
            ctx.fillStyle = 'rgba(0, 153, 255, 0.7)';
            ctx.fillRect(0, canvas.height - waterLevel, canvas.width, waterLevel);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.beginPath();
            for(let i=0; i<canvas.width; i+=25) {
                ctx.lineTo(i, canvas.height - waterLevel + Math.sin(Date.now()/250 + i/50)*7);
            }
            ctx.stroke();

            if(waterLevel >= canvas.height * 0.92) gameOver("KONTROL KAYBEDİLDİ");
            requestAnimationFrame(update);
        }

        function updateLives() { document.getElementById('lives-display').innerText = "❤".repeat(Math.max(0, lives)); }

        function gameOver(msg) {
            gameActive = false;
            document.getElementById('end-msg').innerText = msg;
            document.getElementById('final-res').innerText = score;
            document.getElementById('overlay').style.display = 'flex';
        }

        function resetGame() {
            score = 0; lives = 3; waterLevel = 70; targetWaterLevel = 70; elements = [];
            gameActive = true; updateLives(); 
            document.getElementById('score-num').innerText = "0";
            document.getElementById('overlay').style.display = 'none';
            requestAnimationFrame(update);
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
