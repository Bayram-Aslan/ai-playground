<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CATCHER | ARENA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #050505; --danger: #ff1e1e; }
        body { background: var(--bg); margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        
        .ui-top { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 10; }
        .stat { font-size: 1.5rem; color: var(--neon); text-shadow: 0 0 10px rgba(0,255,136,0.5); }
        
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .play-btn { background: var(--neon); color: black; border: none; padding: 20px 50px; font-size: 2rem; font-family: 'Orbitron'; cursor: pointer; border-radius: 15px; }
        .home-link { margin-top: 25px; color: #555; text-decoration: none; }
    </style>
</head>
<body>
    <div class="ui-top">
        <div id="score-val">SCORE: 0</div>
        <div id="lives-val">LIVES: 3</div>
    </div>

    <div id="overlay" class="menu-overlay">
        <h1 style="color:white; font-size: 3rem; margin-bottom: 10px;">NEON CATCHER</h1>
        <p id="final-stat" style="color:var(--neon); margin-bottom: 30px;">HEDEFLERİ PATLAT, KIRMIZIDAN KAÇ!</p>
        <button class="play-btn" onclick="startCatchGame()">BAŞLA</button>
        <a href="/" class="home-link">LOBİYE DÖN</a>
    </div>

    <canvas id="catchCanvas"></canvas>

    <script src="games/catcher.js"></script>
</body>
</html>
