<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Reaction Test | ARENA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --f1-red: #e10600; --bg: #0b0f1a; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #game-container { text-align: center; width: 100%; max-width: 800px; }
        
        /* F1 Işıkları Tasarımı */
        .lights-container { display: flex; gap: 20px; justify-content: center; margin-bottom: 50px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 4px solid #333; }
        .light-unit { display: flex; flex-direction: column; gap: 10px; }
        .light { width: 60px; height: 60px; background: #222; border-radius: 50%; border: 4px solid #111; transition: background 0.1s; }
        .light.on { background: var(--f1-red); box-shadow: 0 0 30px var(--f1-red); }
        .light.green { background: #00ff88; box-shadow: 0 0 30px #00ff88; }

        /* Gösterge Alanı */
        #status { font-family: 'Orbitron'; font-size: 1.5rem; margin-bottom: 20px; letter-spacing: 2px; height: 40px; }
        #result { font-size: 4rem; font-weight: 900; margin: 20px 0; font-family: 'Orbitron'; color: var(--f1-red); }
        
        .action-btn { background: white; color: black; border: none; padding: 20px 60px; font-size: 1.5rem; font-weight: 900; border-radius: 10px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .action-btn:active { transform: scale(0.95); }
        .back-link { position: absolute; top: 20px; left: 20px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

    <a href="/" class="back-link">← ARENA'YA DÖN</a>

    <div id="game-container">
        <div id="status">HAZIR OLUN...</div>
        
        <div class="lights-container">
            <div class="light-unit"><div class="light"></div><div class="light"></div></div>
            <div class="light-unit"><div class="light"></div><div class="light"></div></div>
            <div class="light-unit"><div class="light"></div><div class="light"></div></div>
            <div class="light-unit"><div class="light"></div><div class="light"></div></div>
            <div class="light-unit"><div class="light"></div><div class="light"></div></div>
        </div>

        <div id="result">0.000s</div>
        <button id="main-btn" class="action-btn" onmousedown="handleClick()">BAŞLAT</button>
    </div>

    <script>
        const lights = document.querySelectorAll('.light');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const btn = document.getElementById('main-btn');
        
        let gameState = 'IDLE'; // IDLE, LIGHTS_ON, WAITING, FINISHED
        let startTime, timer;

        function handleClick() {
            if (gameState === 'IDLE' || gameState === 'FINISHED') {
                startSequence();
            } else if (gameState === 'LIGHTS_ON') {
                jumpStart();
            } else if (gameState === 'WAITING') {
                finish();
            }
        }

        function startSequence() {
            gameState = 'LIGHTS_ON';
            btn.innerText = "ŞİMDİ BAS!";
            result.innerText = "0.000s";
            result.style.color = "white";
            status.innerText = "IŞIKLARIN SÖNMESİNİ BEKLE...";
            
            let currentLight = 0;
            // 5 çift ışığı sırayla yak (F1 stili)
            timer = setInterval(() => {
                lights[currentLight * 2].classList.add('on');
                lights[currentLight * 2 + 1].classList.add('on');
                currentLight++;
                
                if (currentLight === 5) {
                    clearInterval(timer);
                    const randomDelay = Math.random() * 3000 + 1000; // 1-4 saniye arası rastgele
                    setTimeout(goGreen, randomDelay);
                }
            }, 800);
        }

        function goGreen() {
            if (gameState !== 'LIGHTS_ON') return;
            gameState = 'WAITING';
            lights.forEach(l => l.classList.remove('on'));
            startTime = performance.now();
        }

        function jumpStart() {
            clearTimeout(timer);
            gameState = 'FINISHED';
            status.innerText = "HATALI KALKIŞ! (FALSE START)";
            result.innerText = "---";
            result.style.color = "orange";
            btn.innerText = "TEKRAR DENE";
        }

        function finish() {
            const endTime = performance.now();
            const reactionTime = (endTime - startTime) / 1000;
            gameState = 'FINISHED';
            status.innerText = "REAKSİYON SÜRESİ:";
            result.innerText = reactionTime.toFixed(3) + "s";
            result.style.color = "#00ff88";
            btn.innerText = "YENİDEN BAŞLAT";
        }
    </script>
</body>
</html>
